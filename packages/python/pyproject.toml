[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "counted"
version = "0.1.0"
description = "Privacy-first analytics SDK for Python. No cookies, no fingerprinting, no PII."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Iceglobe Enterprises", email = "austin@iceglobe.io" }]
keywords = ["analytics", "privacy", "tracking", "events"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://counted.dev"
Repository = "https://github.com/iceglober/counted"
Documentation = "https://github.com/iceglober/counted/tree/main/packages/python"
