[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Deploy on every push to the tracked branch. Config-as-code overrides the
# dashboard's watch-path filter, which had been silently marking every
# git-triggered deploy SKIPPED (a stale build ran in prod for ~3 weeks in
# 2026-06). "**" matches all files, so a matching change always triggers.
watchPatterns = ["**"]

[deploy]
# Run migrations inside the main container at startup: it has the internal
# DB network (the app connects to it), unlike the pre-deploy one-off container
# which can't resolve *.railway.internal and made migrate fail (ENOTFOUND).
startCommand = "sh scripts/start.sh"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[service]
internalPort = 3000
