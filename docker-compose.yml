# Dev database only — for self-hosting Counted see self-host/ (full app + db + cron).
services:
  db:
    image: timescale/timescaledb:2.27.1-pg17
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: counted
      POSTGRES_PASSWORD: counted
      POSTGRES_DB: counted
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U counted"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
