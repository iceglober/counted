api:
  path: openapi/openapi.json

default-group: local
groups:
  local:
    generators:
      - name: fernapi/fern-typescript-node-sdk
        version: 0.30.0
        output:
          location: local-file-system
          path: ../packages/api/generated
        config:
          namespaceExport: Counted
          allowCustomFetcher: true
