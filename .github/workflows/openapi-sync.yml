name: OpenAPI in sync

# The OpenAPI spec lives in lib/openapi.ts; fern/openapi/openapi.json is exported
# from it (and is what Fern reads to generate the @counted/api client). This guards
# against the committed JSON drifting from the source. No Fern login needed — the
# actual `fern generate` (which does require FERN_TOKEN) runs separately.
on:
  pull_request:
    paths:
      - "lib/openapi.ts"
      - "fern/**"
  workflow_dispatch: {}

jobs:
  sync:
    name: Spec export is current
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun fern/export-spec.ts
      - name: Check fern/openapi/openapi.json is up to date
        run: |
          if ! git diff --exit-code fern/openapi/openapi.json; then
            echo "::error::fern/openapi/openapi.json is stale. Run 'bun run api:export' and commit the result."
            exit 1
          fi
