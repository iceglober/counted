name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright journeys
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      db:
        image: timescale/timescaledb:2.27.1-pg17
        env:
          POSTGRES_USER: counted
          POSTGRES_PASSWORD: counted
          POSTGRES_DB: counted
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U counted"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

    env:
      DATABASE_URL: postgres://counted:counted@localhost:5432/counted
      BETTER_AUTH_SECRET: ci-e2e-secret-not-real-0123456789
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDKs
        run: |
          cd packages/sdk && bun run build
          cd ../react && bun run build
          cd ../migrate && bun run build

      - name: Apply schema
        run: bun run db:migrate

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run E2E
        run: bunx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
