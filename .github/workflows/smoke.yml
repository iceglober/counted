name: Smoke

# Production smoke test. Railway has no clean post-deploy hook, so we run on a
# schedule (catches a bad deploy within the interval) plus on demand. Exercises
# the real data path that /api/health can't — see scripts/smoke.ts.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch:

concurrency:
  group: smoke
  cancel-in-progress: true

jobs:
  smoke:
    name: Production smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Run smoke checks
        run: bun scripts/smoke.ts
        env:
          SMOKE_APP_URL: https://app.counted.dev
          SMOKE_MARKETING_URL: https://www.counted.dev
          # Optional — set as repo secrets to unlock the ingestion + authenticated checks:
          SMOKE_CLIENT_KEY: ${{ secrets.SMOKE_CLIENT_KEY }}
          SMOKE_SESSION_COOKIE: ${{ secrets.SMOKE_SESSION_COOKIE }}
          SMOKE_PROJECT_ID: ${{ secrets.SMOKE_PROJECT_ID }}
