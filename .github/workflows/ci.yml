name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDKs
        run: |
          cd packages/sdk && bun run build
          cd ../react && bun run build
          cd ../migrate && bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Build app
        run: bun run build
        env:
          DATABASE_URL: "postgres://placeholder:placeholder@localhost:5432/counted"
          BETTER_AUTH_SECRET: "ci-build-secret-not-real"
          BETTER_AUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_BETTER_AUTH_URL: "http://localhost:3000"

  release:
    name: Release SDKs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDKs
        run: |
          cd packages/sdk && bun run build
          cd ../react && bun run build
          cd ../migrate && bun run build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: bun node_modules/@changesets/cli/bin.cjs version
          publish: bun node_modules/@changesets/cli/bin.cjs publish
          title: "Version Packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
