name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDKs
        run: cd packages/sdk && bun run build && cd ../react && bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: "postgres://placeholder:placeholder@localhost:5432/counted"
          BETTER_AUTH_SECRET: "ci-build-secret-not-real"
          BETTER_AUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_BETTER_AUTH_URL: "http://localhost:3000"

  sdk:
    name: Build SDKs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK
        run: cd packages/sdk && bun run build

      - name: Build React SDK
        run: cd packages/react && bun run build

      - name: Build Migrate CLI
        run: cd packages/migrate && bun run build
