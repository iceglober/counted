name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDKs
        run: |
          cd packages/sdk && bun run build
          cd ../react && bun run build
          cd ../migrate && bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Build app
        run: bun run build
        env:
          DATABASE_URL: "postgres://placeholder:placeholder@localhost:5432/counted"
          BETTER_AUTH_SECRET: "ci-build-secret-not-real"
          BETTER_AUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_BETTER_AUTH_URL: "http://localhost:3000"

  publish-sdks:
    name: Publish SDKs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDKs
        run: |
          cd packages/sdk && bun run build
          cd ../react && bun run build
          cd ../migrate && bun run build

      - name: Configure npm
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish @counted/sdk
        run: cd packages/sdk && npm publish --access public --provenance || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @counted/react
        run: cd packages/react && npm publish --access public --provenance || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @counted/migrate
        run: cd packages/migrate && npm publish --access public --provenance || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
