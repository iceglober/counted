name: SDK Conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: SDK conformance (JS, Python, Go, Rust)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Pre-build the compiled drivers so the first scenario doesn't race a cold build.
      - name: Pre-build Rust driver
        run: cargo build --example conformance
        working-directory: packages/rust

      - name: Pre-build Go driver
        run: go build -o /dev/null .
        working-directory: tests/conformance/drivers/go-driver

      - name: Run SDK conformance
        run: bun test tests/conformance/conformance.test.ts
