name: Publish SDKs (PyPI / crates.io / Go)

# Parallel to the npm release (changesets in ci.yml). Each language SDK publishes
# itself when its manifest version changes on main. Every job is idempotent and
# self-gating:
#   - skips if the registry already has that version, and
#   - skips (cleanly, not a failure) if the required secret isn't configured yet.
# So adding the secrets later, then re-running via "Run workflow", ships them.
on:
  push:
    branches: [main]
    paths:
      - "packages/python/**"
      - "packages/rust/**"
      - "packages/go/**"
  workflow_dispatch: {}

jobs:
  python:
    name: Publish counted to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Decide whether to publish
        id: check
        working-directory: packages/python
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ -z "$PYPI_TOKEN" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PYPI_TOKEN secret not set — skipping PyPI publish"
          elif curl -fsS -o /dev/null "https://pypi.org/pypi/counted/$VERSION/json"; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::counted $VERSION already on PyPI — skipping"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        if: steps.check.outputs.publish == 'true'
        working-directory: packages/python
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish
        if: steps.check.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist
          password: ${{ secrets.PYPI_TOKEN }}

  rust:
    name: Publish counted-sdk to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Decide whether to publish
        id: check
        working-directory: packages/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # crates.io returns 200 for an existing version, 404 otherwise; it
          # requires a User-Agent. A 404 (curl -f -> nonzero) means "not yet published".
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CARGO_REGISTRY_TOKEN secret not set — skipping crates.io publish"
          elif curl -fsS -o /dev/null -H "User-Agent: counted-ci (austin@iceglobe.io)" \
              "https://crates.io/api/v1/crates/counted-sdk/$VERSION"; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::counted-sdk $VERSION already on crates.io — skipping"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        if: steps.check.outputs.publish == 'true'
        working-directory: packages/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  go:
    name: Tag Go module
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need existing tags
      - name: Tag packages/go/v<VERSION> if new
        run: |
          VERSION=$(tr -d '[:space:]' < packages/go/VERSION)
          TAG="packages/go/v$VERSION"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::notice::$TAG already exists — skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "::notice::Pushed $TAG — the Go module proxy indexes it on first fetch"
          fi
